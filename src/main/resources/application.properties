spring.application.name=itadaki

spring.datasource.url=jdbc:h2:file:./data/itadaki
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Spring AI Ollama ---
# base-url overridable at runtime via OLLAMA_URL env var (used to point at ngrok tunnel in demo).
# See AI_Model/VALIDATION-OLLAMA.md for the demo procedure.
spring.ai.ollama.base-url=${OLLAMA_URL:http://localhost:11434}
spring.ai.ollama.chat.model=qwen2.5vl:7b

# --- Upload multipart (BF3 photo upload) ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
app.upload.dir=./uploads

# --- Timezone (BF4 agrégation calories/jour) ---
spring.jackson.time-zone=Europe/Paris

# --- Swagger UI ---
springdoc.swagger-ui.try-it-out-enabled=true