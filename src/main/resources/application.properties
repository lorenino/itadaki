spring.application.name=itadaki

spring.datasource.url=jdbc:h2:file:./data/itadaki
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Spring AI Ollama ---
# Tunnel ngrok (custom domain stable) pointe sur Ollama de Hugo (RTX 5060).
# Surchargeable via OLLAMA_URL (ex. localhost en dev Ahmed, ou autre IP).
# Cf. AI_Model/VALIDATION-OLLAMA.md pour la procedure complete.
spring.ai.ollama.base-url=${OLLAMA_URL:https://ducky-shrank-washer.ngrok-free.dev}
spring.ai.ollama.chat.model=qwen2.5vl:7b

# --- Upload multipart (BF3 photo upload) ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
app.upload.dir=./uploads

# --- Timezone (BF4 agrégation calories/jour) ---
spring.jackson.time-zone=Europe/Paris

# --- Swagger UI ---
springdoc.swagger-ui.try-it-out-enabled=true