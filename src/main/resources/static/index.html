<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Itadaki — Analysez vos repas</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <!-- React 18 + ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel Standalone pour transpiler JSX dans le navigateur -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; background: var(--page-bg, oklch(0.95 0.02 65)); }
    #root { height: 100%; overflow: hidden; }

    /* Scrollbar douce */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scroll, oklch(0.85 0.02 60)); border-radius: 3px; }

    /* Animations globales référencées par les composants */
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes breathe  { 0%,100%{opacity:.8;transform:translate(-50%,-50%) scale(1);} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.3);} }
    @keyframes rise     { from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);} }

    /* Splash pendant le chargement */
    #splash {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: oklch(0.95 0.02 65); z-index: 9999;
      font-family: 'Inter', system-ui, sans-serif; color: oklch(0.46 0.022 50); font-size: 14px;
      flex-direction: column; gap: 16px;
    }
    #splash-logo {
      width: 52px; height: 52px; border-radius: 18px 18px 18px 7px;
      background: oklch(0.67 0.16 52); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif; font-size: 30px; font-style: italic; font-weight: 500;
      transform: rotate(-4deg); animation: spin 8s linear infinite;
    }
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-logo">i</div>
    <span>Itadaki charge…</span>
  </div>
  <div id="root"></div>

  <script>
    /**
     * Chargement séquentiel des modules JSX via fetch + Babel.transform.
     * Garantit l'ordre d'exécution (chaque fichier peut utiliser les globals du précédent).
     * Pas de build step — Spring Boot sert static/ directement.
     */
    (async function loadJSX() {
      const files = [
        'v2/tokens.jsx',
        'v2/primitives.jsx',
        'v2/screens.jsx',
        'v2/screens2.jsx',
        'v2/app.jsx',
      ];

      try {
        for (const path of files) {
          const res = await fetch(path);
          if (!res.ok) throw new Error('HTTP ' + res.status + ' pour ' + path);
          const src = await res.text();
          const { code } = Babel.transform(src, {
            presets: ['react'],
            filename: path,
          });
          // Injection dans le DOM via <script> pour exécuter dans le scope global
          // (garantit que les variables déclarées sont visibles par les fichiers suivants)
          await new Promise((resolve, reject) => {
            const script = document.createElement('script');
            // Blob URL pour pouvoir avoir un nom de fichier dans les devtools
            const blob = new Blob([code], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            script.src = url;
            script.onload = () => { URL.revokeObjectURL(url); resolve(); };
            script.onerror = (e) => { URL.revokeObjectURL(url); reject(new Error('Échec exécution ' + path)); };
            document.head.appendChild(script);
          });
        }
        // Tout est chargé — cache le splash
        document.getElementById('splash').style.display = 'none';
      } catch (err) {
        const splash = document.getElementById('splash');
        splash.innerHTML = '<div style="color:oklch(0.55 0.18 25);font-family:Inter,system-ui;font-size:14px;padding:24px;max-width:500px;text-align:center">'
          + '<strong>Erreur de chargement</strong><br><pre style="margin-top:12px;font-size:11px;text-align:left;white-space:pre-wrap">'
          + err.message + '</pre></div>';
        console.error('Itadaki boot error:', err);
      }
    })();
  </script>
</body>
</html>
